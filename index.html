<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARE AI — India</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          cinzel: ['"Cinzel Decorative"', 'serif'],
          raj: ['Rajdhani', 'sans-serif'],
        },
        keyframes: {
          mapglow: {
            '0%,100%': { filter: 'drop-shadow(0 0 12px #00e5ff) drop-shadow(0 0 28px #00e5ff) drop-shadow(0 0 60px rgba(0,229,255,0.6))' },
            '50%': { filter: 'drop-shadow(0 0 24px #00e5ff) drop-shadow(0 0 55px #00e5ff) drop-shadow(0 0 110px rgba(0,229,255,0.9))' },
          },
          mapglowlight: {
            '0%,100%': { filter: 'brightness(0.25) sepia(1) hue-rotate(180deg) saturate(6) drop-shadow(0 0 10px rgba(3,105,161,0.9)) drop-shadow(0 0 28px rgba(3,105,161,0.6))' },
            '50%': { filter: 'brightness(0.35) sepia(1) hue-rotate(180deg) saturate(6) drop-shadow(0 0 20px rgba(3,105,161,1)) drop-shadow(0 0 50px rgba(3,105,161,0.8))' },
          },
          ringpulse: {
            '0%,100%': { opacity: '0.2', transform: 'translate(-50%,-50%) scale(1)' },
            '50%': { opacity: '0.55', transform: 'translate(-50%,-50%) scale(1.03)' },
          },
          floatup: {
            '0%': { transform: 'translateY(110vh) scale(0)', opacity: '0' },
            '8%': { opacity: '1' },
            '92%': { opacity: '1' },
            '100%': { transform: 'translateY(-80px) scale(1)', opacity: '0' },
          },
          blink: {
            '0%,100%': { opacity: '0.25' },
            '50%': { opacity: '0.8' },
          },
          textglow: {
            '0%,100%': { textShadow: '0 0 8px #00e5ff, 0 0 25px #00e5ff, 0 0 55px rgba(0,229,255,0.9)' },
            '50%': { textShadow: '0 0 18px #00e5ff, 0 0 50px #00e5ff, 0 0 100px rgba(0,229,255,1)' },
          },
          fadein: {
            '0%': { opacity: '0', transform: 'translateY(20px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          },
        },
        animation: {
          mapglow: 'mapglow 3s ease-in-out infinite',
          mapglowlight: 'mapglowlight 3s ease-in-out infinite',
          ringpulse: 'ringpulse 4s ease-in-out infinite',
          ringpulse2: 'ringpulse 4s ease-in-out infinite 0.9s',
          ringpulse3: 'ringpulse 4s ease-in-out infinite 1.8s',
          floatup: 'floatup linear infinite',
          blink: 'blink 2.2s ease-in-out infinite',
          textglow: 'textglow 3s ease-in-out infinite',
          fadein: 'fadein 0.7s ease forwards',
        },
      },
    },
  }
</script>
<style>
  body { font-family: 'Rajdhani', sans-serif; }
  .map-dark { animation: mapglow 3s ease-in-out infinite; }
  .map-light { animation: mapglowlight 3s ease-in-out infinite; }
  .ring { position: absolute; border-radius: 50%; border: 1px solid; top: 50%; left: 50%; animation: ringpulse 4s ease-in-out infinite; pointer-events: none; }
  .text-glow { animation: textglow 3s ease-in-out infinite; }
  .particle { position: absolute; border-radius: 50%; animation: floatup linear infinite; opacity: 0; background: rgba(0,229,255,0.5); }
  .particle-light { background: rgba(3,105,161,0.35); }
  .grid-bg {
    background-image: linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .grid-bg-light {
    background-image: linear-gradient(rgba(3,105,161,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(3,105,161,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  input:focus { outline: none; }
  .card-glow { box-shadow: 0 0 50px rgba(0,229,255,0.08), 0 0 100px rgba(0,229,255,0.04), inset 0 1px 0 rgba(0,229,255,0.1); }
  .card-glow-light { box-shadow: 0 20px 60px rgba(3,105,161,0.15), 0 0 40px rgba(3,105,161,0.05); }
  .btn-glow:hover { box-shadow: 0 0 40px rgba(0,229,255,0.4), 0 0 80px rgba(0,229,255,0.2); }
</style>
</head>
<body class="dark bg-gray-950 text-cyan-50 overflow-hidden min-h-screen transition-colors duration-500 font-raj">

<!-- Grid BG -->
<div id="gridBg" class="fixed inset-0 z-0 pointer-events-none grid-bg"></div>

<!-- Particles -->
<div id="particles" class="fixed inset-0 z-10 pointer-events-none overflow-hidden"></div>

<!-- Theme Toggle -->
<button id="themeBtn" onclick="toggleTheme(event)"
  class="fixed top-5 right-5 z-50 cursor-pointer bg-white/10 border border-white/20 rounded-full px-4 py-2 text-xs font-semibold tracking-widest backdrop-blur-md hover:scale-105 transition-all">
  ☀ LIGHT
</button>

<!-- Back Button -->
<button id="backBtn" onclick="goBack(event)"
  class="fixed top-5 left-5 z-50 cursor-pointer bg-white/10 border border-white/20 rounded-full px-4 py-2 text-xs font-semibold tracking-widest backdrop-blur-md hover:scale-105 transition-all opacity-0 pointer-events-none"
  style="transition: opacity 0.4s ease">
  ← BACK
</button>

<div id="loginPage"
  class="fixed inset-0 z-10 flex items-center justify-center opacity-0 pointer-events-none"
  style="transition: opacity 0.7s ease 0.35s">

  <div id="loginCard"
    class="w-96 max-w-[90vw] rounded-3xl p-12 relative bg-gray-950/90 border border-cyan-400/20 backdrop-blur-2xl card-glow"
    style="transform: translateY(24px); transition: transform 0.7s ease 0.35s, opacity 0.7s ease 0.35s; opacity: 0;">

    <!-- Corner brackets -->
    <span class="absolute top-3 left-3 w-5 h-5 border-t-2 border-l-2 border-cyan-400/40 rounded-tl"></span>
    <span class="absolute top-3 right-3 w-5 h-5 border-t-2 border-r-2 border-cyan-400/40 rounded-tr"></span>
    <span class="absolute bottom-3 left-3 w-5 h-5 border-b-2 border-l-2 border-cyan-400/40 rounded-bl"></span>
    <span class="absolute bottom-3 right-3 w-5 h-5 border-b-2 border-r-2 border-cyan-400/40 rounded-br"></span>

    <!-- Logo -->
    <div class="text-center mb-8">
      <h2 class="font-cinzel font-black text-xl tracking-[4px] text-white text-glow">CARE AI</h2>
      <p class="text-[9px] tracking-[4px] font-light mt-2 opacity-60 uppercase">Intelligence · Health · India</p>
    </div>

    <p id="loginSubtitle" class="text-center text-[10px] tracking-[5px] uppercase font-semibold opacity-40 mb-7">Secure Access</p>

    <!-- Email -->
    <div class="mb-5">
      <label id="emailLabel" class="block text-[10px] tracking-[3px] uppercase font-semibold opacity-55 mb-2">Email Address</label>
      <input id="emailInput" type="email" placeholder="you@example.com"
        class="w-full px-4 py-3 rounded-xl bg-cyan-400/5 border border-cyan-400/20 text-cyan-50 text-base tracking-wide placeholder-cyan-400/30 focus:border-cyan-400 focus:bg-cyan-400/10 focus:shadow-[0_0_20px_rgba(0,229,255,0.2)] transition-all"
        onkeydown="handleEnter(event)" />
      <p id="emailErr" class="text-red-400 text-[10px] tracking-wide font-bold mt-1 hidden">⚠ Please enter your email address</p>
    </div>

    <!-- Password -->
    <div class="mb-6">
      <label id="passLabel" class="block text-[10px] tracking-[3px] uppercase font-semibold opacity-55 mb-2">Password</label>
      <input id="passInput" type="password" placeholder="••••••••••"
        class="w-full px-4 py-3 rounded-xl bg-cyan-400/5 border border-cyan-400/20 text-cyan-50 text-base tracking-wide placeholder-cyan-400/30 focus:border-cyan-400 focus:bg-cyan-400/10 focus:shadow-[0_0_20px_rgba(0,229,255,0.2)] transition-all"
        onkeydown="handleEnter(event)" />
      <p id="passErr" class="text-red-400 text-[10px] tracking-wide font-bold mt-1 hidden">⚠ Please enter your password</p>
    </div>

    <!-- Error message -->
    <p id="loginErr" class="text-red-400 text-[10px] tracking-wide font-bold text-center mb-3 hidden">⚠ Both email and password are required</p>

    <!-- Button -->
    <button onclick="doLogin()" class="w-full py-4 rounded-xl font-cinzel font-bold text-sm tracking-[3px] cursor-pointer border border-cyan-400/60 text-cyan-400 bg-cyan-400/10 hover:bg-cyan-400/25 btn-glow transition-all hover:-translate-y-0.5">
      ENTER
    </button>

    <p class="text-center mt-6 text-[10px] tracking-[2px] opacity-30">CARE AI · INDIA · 2026</p>
  </div>
</div>

<script>
  let isDark = true;

  function toggleTheme(e) {
    e.stopPropagation();
    isDark = !isDark;
    const html = document.documentElement;
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    const map = document.getElementById('indiaMap');
    const grid = document.getElementById('gridBg');
    const card = document.getElementById('loginCard');
    const loginPage = document.getElementById('loginPage');
    const particles = document.querySelectorAll('.particle');
    const emailInput = document.getElementById('emailInput');
    const passInput = document.getElementById('passInput');
    const emailLabel = document.getElementById('emailLabel');
    const passLabel = document.getElementById('passLabel');
    const loginSubtitle = document.getElementById('loginSubtitle');
    const brandText = card.querySelector('h2');

    if (isDark) {
      html.classList.add('dark');
      body.className = body.className.replace('bg-slate-100 text-slate-800','') + ' bg-gray-950 text-cyan-50';
      btn.textContent = '☀ LIGHT';
      map.className = map.className.replace('map-light','map-dark');
      grid.className = grid.className.replace('grid-bg-light','grid-bg');
      card.className = card.className.replace('bg-white/90 border-blue-300/30 card-glow-light','bg-gray-950/90 border-cyan-400/20 card-glow');
      loginPage.className = loginPage.className.replace('bg-slate-100/50','');
      particles.forEach(p => p.classList.remove('particle-light'));
      // Restore dark input styles
      [emailInput, passInput].forEach(inp => {
        inp.className = 'w-full px-4 py-3 rounded-xl bg-cyan-400/5 border border-cyan-400/20 text-cyan-50 text-base tracking-wide placeholder-cyan-400/30 focus:border-cyan-400 focus:bg-cyan-400/10 focus:shadow-[0_0_20px_rgba(0,229,255,0.2)] transition-all';
      });
      [emailLabel, passLabel].forEach(lbl => { lbl.style.color = ''; });
      if (loginSubtitle) loginSubtitle.style.color = '';
      if (brandText) { brandText.style.color = ''; brandText.style.textShadow = ''; }
    } else {
      html.classList.remove('dark');
      body.className = body.className.replace('bg-gray-950 text-cyan-50','') + ' bg-slate-100 text-slate-800';
      btn.textContent = '☾ DARK';
      map.className = map.className.replace('map-dark','map-light');
      grid.className = grid.className.replace('grid-bg','grid-bg-light');
      card.className = card.className.replace('bg-gray-950/90 border-cyan-400/20 card-glow','bg-white/90 border-blue-300/30 card-glow-light');
      particles.forEach(p => p.classList.add('particle-light'));
      // Apply light input styles
      [emailInput, passInput].forEach(inp => {
        inp.className = 'w-full px-4 py-3 rounded-xl bg-sky-50 border border-sky-300 text-slate-800 text-base tracking-wide placeholder-slate-400 focus:border-sky-500 focus:bg-sky-100 focus:shadow-[0_0_16px_rgba(3,105,161,0.2)] transition-all';
      });
      [emailLabel, passLabel].forEach(lbl => { lbl.style.color = '#0369a1'; });
      if (loginSubtitle) loginSubtitle.style.color = '#64748b';
      if (brandText) { brandText.style.color = '#0369a1'; brandText.style.textShadow = '0 0 20px rgba(3,105,161,0.4)'; }
    }
  }

  function doLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const pass = document.getElementById('passInput').value.trim();
    const emailErr = document.getElementById('emailErr');
    const passErr = document.getElementById('passErr');
    emailErr.classList.add('hidden');
    passErr.classList.add('hidden');
    let valid = true;
    if (!email) { emailErr.classList.remove('hidden'); valid = false; document.getElementById('emailInput').focus(); }
    if (!pass) { passErr.classList.remove('hidden'); valid = false; if (email) document.getElementById('passInput').focus(); }
    if (!valid) return;
    const enterBtn = document.querySelector('#loginCard button[onclick="doLogin()"]');
    enterBtn.textContent = 'ENTERING...';
    enterBtn.disabled = true;
    enterBtn.style.opacity = '0.7';
    setTimeout(() => { window.location.href = './profile.html'; }, 800);
  }

  function handleEnter(event) {
    if (event.key === 'Enter') doLogin();
  }

  function goToLogin() {
    const splash = document.getElementById('splash');
    const loginPage = document.getElementById('loginPage');
    const loginCard = document.getElementById('loginCard');
    const backBtn = document.getElementById('backBtn');
    splash.style.opacity = '0';
    splash.style.transform = 'scale(0.94)';
    splash.style.pointerEvents = 'none';
    setTimeout(() => {
      loginPage.style.opacity = '1';
      loginPage.style.pointerEvents = 'all';
      loginCard.style.transform = 'translateY(0)';
      loginCard.style.opacity = '1';
      backBtn.style.opacity = '1';
      backBtn.style.pointerEvents = 'all';
    }, 380);
  }

  function goBack(e) {
    e.stopPropagation();
    const splash = document.getElementById('splash');
    const loginPage = document.getElementById('loginPage');
    const loginCard = document.getElementById('loginCard');
    const backBtn = document.getElementById('backBtn');
    loginPage.style.opacity = '0';
    loginPage.style.pointerEvents = 'none';
    loginCard.style.transform = 'translateY(24px)';
    loginCard.style.opacity = '0';
    backBtn.style.opacity = '0';
    backBtn.style.pointerEvents = 'none';
    setTimeout(() => {
      splash.style.opacity = '1';
      splash.style.transform = 'scale(1)';
      splash.style.pointerEvents = 'all';
    }, 350);
  }

  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = Math.random() * 4 + 2;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${Math.random()*14+10}s;animation-delay:${Math.random()*14}s;`;
    container.appendChild(p);
  }
</script>
</body>
</html>
